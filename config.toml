# Ability Memory Configuration
# Secrets go in secrets.toml (encrypted vault)

[broker.local]
URL = "ws://localhost:8080/kadi"
NETWORKS = ["memory"]
MODE = "native"

[broker.remote]
URL = "wss://broker.dadavidtseng.com/kadi"
NETWORKS = ["memory"]
MODE = "native"

[memory]
database = "agents_memory"
embedding_model = "text-embedding-3-small"
extraction_model = "gpt-5-nano"
summarization_model = "gpt-5-mini"
chat_model = "gpt-5-mini"
default_agent = "default"
embedding_transport = "api"
chat_transport = "api"
